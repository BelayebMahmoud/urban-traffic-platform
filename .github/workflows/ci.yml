name: CI — Lint, Test & Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '22'
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/urban-traffic

jobs:
  # ── Backend ─────────────────────────────────────────────────────────────────
  backend-lint-test:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: urban_user
          POSTGRES_PASSWORD: urban_pass
          POSTGRES_DB: urban_traffic
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://urban_user:urban_pass@localhost:5432/urban_traffic

      - name: Lint
        run: npm run lint

      - name: Run unit tests
        run: npm test -- --passWithNoTests --forceExit
        env:
          DATABASE_URL: postgresql://urban_user:urban_pass@localhost:5432/urban_traffic
          JWT_SECRET: ci-test-secret

  backend-build:
    name: Backend — Build
    runs-on: ubuntu-latest
    needs: backend-lint-test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build all apps
        run: npm run build
        env:
          DATABASE_URL: postgresql://urban_user:urban_pass@localhost:5432/urban_traffic

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend-lint-build:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (static export for Pages)
        run: npm run build
        env:
          STATIC_EXPORT: 'true'
          NEXT_PUBLIC_BASE_PATH: ''
          NEXT_PUBLIC_API_URL: ${{ vars.PROD_API_URL || 'http://localhost:3000' }}

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

  # ── Docker images ─────────────────────────────────────────────────────────────
  docker-build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-lint-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - { name: api-gateway, dockerfile: apps/api-gateway/Dockerfile, context: ., args: '' }
          - { name: auth-service, dockerfile: Dockerfile.service, context: ., args: "SERVICE_NAME=auth-service\nSERVICE_PORT=3001" }
          - { name: vehicle-service, dockerfile: Dockerfile.service, context: ., args: "SERVICE_NAME=vehicle-service\nSERVICE_PORT=3002" }
          - { name: traffic-service, dockerfile: Dockerfile.service, context: ., args: "SERVICE_NAME=traffic-service\nSERVICE_PORT=3003" }
          - { name: incident-service, dockerfile: Dockerfile.service, context: ., args: "SERVICE_NAME=incident-service\nSERVICE_PORT=3004" }
          - { name: notification-service, dockerfile: Dockerfile.service, context: ., args: "SERVICE_NAME=notification-service\nSERVICE_PORT=3005" }
          - { name: frontend, dockerfile: frontend/Dockerfile, context: ./frontend, args: '' }

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service.name }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          build-args: ${{ matrix.service.args }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
