# ================================================================
# CI — Lint, Test & Build
# Urban Traffic Platform (NestJS monorepo · GraphQL · MySQL 8)
# ================================================================
#
# Required GitHub Secrets:
#   JWT_SECRET            — Secret key used to sign JWT tokens
#
# Required GitHub Variables (optional, fallback values are used):
#   PROD_API_URL          — Production API URL (used by frontend build)
#
# Note: unit tests mock all Prisma calls — no real database needed.
# The MySQL service is only used by integration smoke tests (docker-compose.test.yml).
# ================================================================

name: CI — Lint, Test & Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/urban-traffic

jobs:
  # ── Job 1: Backend — Lint & Unit Tests ──────────────────────────────────────
  backend-lint-test:
    name: Backend — Lint & Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run ESLint
        run: npm run lint

      - name: Run unit tests (all Prisma calls are mocked — no DB required)
        run: npm test -- --passWithNoTests --forceExit
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-test-secret' }}
          NODE_ENV: test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: coverage/
          retention-days: 7

  # ── Job 2: Backend — Build ────────────────────────────────────────────────────
  backend-build:
    name: Backend — Build (api-gateway)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: backend-lint-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build api-gateway
        # Explicitly builds api-gateway — avoids the stale urban-traffic-platform default
        run: npx nest build api-gateway

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: dist/
          retention-days: 3

  # ── Job 3: Frontend — Lint & Build ───────────────────────────────────────────
  frontend-lint-build:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Skip if no frontend directory exists
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if frontend directory exists
        id: frontend_check
        run: |
          if [ -d "../frontend" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        working-directory: .

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        if: steps.frontend_check.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        if: steps.frontend_check.outputs.exists == 'true'
        run: npm ci

      - name: Run frontend lint
        if: steps.frontend_check.outputs.exists == 'true'
        run: npm run lint

      - name: Build frontend (static export)
        if: steps.frontend_check.outputs.exists == 'true'
        run: npm run build
        env:
          STATIC_EXPORT: 'true'
          NEXT_PUBLIC_BASE_PATH: ''
          NEXT_PUBLIC_API_URL: ${{ vars.PROD_API_URL || 'http://localhost:3000' }}

      - name: Upload Pages artifact
        if: >-
          steps.frontend_check.outputs.exists == 'true' &&
          github.ref == 'refs/heads/main' &&
          github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

  # ── Job 4: Docker — Build & Push (main branch only) ──────────────────────────
  docker-build:
    name: Docker — Build & Push (${{ matrix.service.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [backend-build, frontend-lint-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: api-gateway, dockerfile: apps/api-gateway/Dockerfile, context: . }

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-platform)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service.name }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
